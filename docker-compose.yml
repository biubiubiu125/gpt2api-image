services:
  config-migrate:
    image: alpine:3.20
    container_name: gpt2api-image-config-migrate
    restart: "no"
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: >
      sh -c 'set -eu;
      mkdir -p data;
      if [ ! -f data/config.json ]; then
        if [ -f config.json ] && [ ! -d config.json ]; then
          cp config.json data/config.json;
        elif [ -f config.example.json ]; then
          cp config.example.json data/config.json;
        else
          printf "{}\n" > data/config.json;
        fi;
      fi'

  postgres:
    image: postgres:16-alpine
    container_name: gpt2api-image-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gpt2api_image
      POSTGRES_USER: gpt2api_image
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpt2api_image -d gpt2api_image"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    image: ${GPT2API_IMAGE_IMAGE:-gpt2api-image:local}
    container_name: gpt2api-image-api
    restart: unless-stopped
    depends_on:
      config-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "2008:80"
    volumes:
      - ./data:/app/data
    environment:
      - GPT2API_IMAGE_MODE=serve
      - GPT2API_IMAGE_ADDR=:80
      - GPT2API_IMAGE_CONFIG_FILE=/app/data/config.json
      - GPT2API_IMAGE_AUTH_KEY=${GPT2API_IMAGE_AUTH_KEY:?set GPT2API_IMAGE_AUTH_KEY}
      - GPT2API_IMAGE_REGISTER_INTERNAL_KEY=${GPT2API_IMAGE_REGISTER_INTERNAL_KEY:?set GPT2API_IMAGE_REGISTER_INTERNAL_KEY}
      - GPT2API_IMAGE_REGISTER_EXECUTOR_URL=http://register-executor:8091
      - GPT2API_IMAGE_DATABASE_URL=postgresql://gpt2api_image:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/gpt2api_image
      - GPT2API_IMAGE_BASE_URL=${GPT2API_IMAGE_BASE_URL:?set GPT2API_IMAGE_BASE_URL to the public API URL}
      - GPT2API_IMAGE_DB_MAX_OPEN_CONNS=${GPT2API_IMAGE_DB_MAX_OPEN_CONNS:-20}
      - GPT2API_IMAGE_DB_MAX_IDLE_CONNS=${GPT2API_IMAGE_DB_MAX_IDLE_CONNS:-10}
      - GPT2API_IMAGE_UPSTREAM_TRANSPORT=${GPT2API_IMAGE_UPSTREAM_TRANSPORT:-tls-client}
      - GPT2API_IMAGE_ROUTE_STRATEGY=${GPT2API_IMAGE_ROUTE_STRATEGY:-web_first}
      - GPT2API_IMAGE_CURL_IMPERSONATE_AUTO_DOWNLOAD=${GPT2API_IMAGE_CURL_IMPERSONATE_AUTO_DOWNLOAD:-1}
      - GPT2API_IMAGE_CORS_ALLOWED_ORIGINS=${GPT2API_IMAGE_CORS_ALLOWED_ORIGINS:-}
      - GPT2API_IMAGE_LOG_REQUEST_TEXT=${GPT2API_IMAGE_LOG_REQUEST_TEXT:-0}
      - TZ=${TZ:-Asia/Shanghai}

  register-executor:
    build: ./register-executor
    image: ${GPT2API_IMAGE_REGISTER_EXECUTOR_IMAGE:-gpt2api-image-register-executor:local}
    container_name: gpt2api-image-register-executor
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./data:/app/data
    environment:
      - REGISTER_EXECUTOR_ADDR=0.0.0.0
      - REGISTER_EXECUTOR_PORT=8091
      - GPT2API_IMAGE_API_BASE_URL=http://api
      - GPT2API_IMAGE_AUTH_KEY=${GPT2API_IMAGE_AUTH_KEY:?set GPT2API_IMAGE_AUTH_KEY}
      - GPT2API_IMAGE_REGISTER_INTERNAL_KEY=${GPT2API_IMAGE_REGISTER_INTERNAL_KEY:?set GPT2API_IMAGE_REGISTER_INTERNAL_KEY}
      - TZ=${TZ:-Asia/Shanghai}

  worker:
    image: ${GPT2API_IMAGE_IMAGE:-gpt2api-image:local}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    environment:
      - GPT2API_IMAGE_MODE=worker
      - GPT2API_IMAGE_CONFIG_FILE=/app/data/config.json
      - GPT2API_IMAGE_AUTH_KEY=${GPT2API_IMAGE_AUTH_KEY:?set GPT2API_IMAGE_AUTH_KEY}
      - GPT2API_IMAGE_REGISTER_INTERNAL_KEY=${GPT2API_IMAGE_REGISTER_INTERNAL_KEY:?set GPT2API_IMAGE_REGISTER_INTERNAL_KEY}
      - GPT2API_IMAGE_REGISTER_EXECUTOR_URL=http://register-executor:8091
      - GPT2API_IMAGE_DATABASE_URL=postgresql://gpt2api_image:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/gpt2api_image
      - GPT2API_IMAGE_BASE_URL=${GPT2API_IMAGE_BASE_URL:?set GPT2API_IMAGE_BASE_URL to the public API URL}
      - GPT2API_IMAGE_WORKER_CONCURRENCY=${GPT2API_IMAGE_WORKER_CONCURRENCY:-4}
      - GPT2API_IMAGE_WORKER_HEARTBEAT_INTERVAL_SECS=${GPT2API_IMAGE_WORKER_HEARTBEAT_INTERVAL_SECS:-5}
      - GPT2API_IMAGE_DB_MAX_OPEN_CONNS=${GPT2API_IMAGE_DB_MAX_OPEN_CONNS:-20}
      - GPT2API_IMAGE_DB_MAX_IDLE_CONNS=${GPT2API_IMAGE_DB_MAX_IDLE_CONNS:-10}
      - GPT2API_IMAGE_UPSTREAM_TRANSPORT=${GPT2API_IMAGE_UPSTREAM_TRANSPORT:-tls-client}
      - GPT2API_IMAGE_ROUTE_STRATEGY=${GPT2API_IMAGE_ROUTE_STRATEGY:-web_first}
      - GPT2API_IMAGE_CURL_IMPERSONATE_AUTO_DOWNLOAD=${GPT2API_IMAGE_CURL_IMPERSONATE_AUTO_DOWNLOAD:-1}
      - GPT2API_IMAGE_LOG_REQUEST_TEXT=${GPT2API_IMAGE_LOG_REQUEST_TEXT:-0}
      - TZ=${TZ:-Asia/Shanghai}

volumes:
  postgres_data:
